name: Generate Animations

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Bijal04
          outputs: |
            dist/pacman-dark.svg?palette=github-dark&type=pacman
            dist/space-invaders-dark.svg?palette=github-dark&type=invaders
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

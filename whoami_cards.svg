<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

      .title-text { font-size: 13px; font-weight: 600; font-family: 'Inter', -apple-system, sans-serif; }
      .sub-text   { font-size: 11px; font-weight: 400; font-family: 'Inter', -apple-system, sans-serif; }
      .icon-text  { font-size: 26px; }

      /* Pop-in + glow loop per card */
      @keyframes popin {
        0%   { transform: scale(0.6); opacity: 0; filter: blur(4px); }
        60%  { transform: scale(1.07); opacity: 1; filter: blur(0px); }
        75%  { transform: scale(0.97); }
        88%  { transform: scale(1.02); }
        100% { transform: scale(1);   opacity: 1; filter: blur(0px); }
      }

      @keyframes glow-blue {
        0%,100% { filter: drop-shadow(0 0 4px #B5D4F4) drop-shadow(0 2px 8px rgba(55,138,221,0.18)); }
        50%     { filter: drop-shadow(0 0 14px #378ADD) drop-shadow(0 4px 18px rgba(55,138,221,0.38)); }
      }
      @keyframes glow-purple {
        0%,100% { filter: drop-shadow(0 0 4px #CECBF6) drop-shadow(0 2px 8px rgba(127,119,221,0.18)); }
        50%     { filter: drop-shadow(0 0 14px #7F77DD) drop-shadow(0 4px 18px rgba(127,119,221,0.38)); }
      }
      @keyframes glow-teal {
        0%,100% { filter: drop-shadow(0 0 4px #9FE1CB) drop-shadow(0 2px 8px rgba(29,158,117,0.18)); }
        50%     { filter: drop-shadow(0 0 14px #1D9E75) drop-shadow(0 4px 18px rgba(29,158,117,0.38)); }
      }
      @keyframes glow-amber {
        0%,100% { filter: drop-shadow(0 0 4px #FAC775) drop-shadow(0 2px 8px rgba(186,117,23,0.18)); }
        50%     { filter: drop-shadow(0 0 14px #EF9F27) drop-shadow(0 4px 18px rgba(186,117,23,0.38)); }
      }
      @keyframes glow-green {
        0%,100% { filter: drop-shadow(0 0 4px #C0DD97) drop-shadow(0 2px 8px rgba(99,153,34,0.18)); }
        50%     { filter: drop-shadow(0 0 14px #97C459) drop-shadow(0 4px 18px rgba(99,153,34,0.38)); }
      }

      .c1 { animation: popin 0.55s cubic-bezier(.22,1,.36,1) 0.2s both, glow-blue   3s ease-in-out 0.75s infinite; }
      .c2 { animation: popin 0.55s cubic-bezier(.22,1,.36,1) 0.5s both, glow-purple 3s ease-in-out 1.05s infinite; }
      .c3 { animation: popin 0.55s cubic-bezier(.22,1,.36,1) 0.8s both, glow-teal   3s ease-in-out 1.35s infinite; }
      .c4 { animation: popin 0.55s cubic-bezier(.22,1,.36,1) 1.1s both, glow-amber  3s ease-in-out 1.65s infinite; }
      .c5 { animation: popin 0.55s cubic-bezier(.22,1,.36,1) 1.4s both, glow-green  3s ease-in-out 1.95s infinite; }

      /* Light mode */
      .bg-blue   { fill: #EBF3FD; stroke: #85B7EB; }
      .bg-purple { fill: #EEEDFE; stroke: #AFA9EC; }
      .bg-teal   { fill: #E1F5EE; stroke: #5DCAA5; }
      .bg-amber  { fill: #FAEEDA; stroke: #EF9F27; }
      .bg-green  { fill: #EAF3DE; stroke: #97C459; }

      .t-blue   { fill: #185FA5; }
      .t-purple { fill: #534AB7; }
      .t-teal   { fill: #0F6E56; }
      .t-amber  { fill: #854F0B; }
      .t-green  { fill: #3B6D11; }

      .s-blue   { fill: #378ADD; }
      .s-purple { fill: #7F77DD; }
      .s-teal   { fill: #1D9E75; }
      .s-amber  { fill: #BA7517; }
      .s-green  { fill: #639922; }

      @media (prefers-color-scheme: dark) {
        .bg-blue   { fill: #0C447C; stroke: #378ADD; }
        .bg-purple { fill: #3C3489; stroke: #7F77DD; }
        .bg-teal   { fill: #085041; stroke: #1D9E75; }
        .bg-amber  { fill: #633806; stroke: #EF9F27; }
        .bg-green  { fill: #27500A; stroke: #97C459; }

        .t-blue   { fill: #B5D4F4; }
        .t-purple { fill: #CECBF6; }
        .t-teal   { fill: #9FE1CB; }
        .t-amber  { fill: #FAC775; }
        .t-green  { fill: #C0DD97; }

        .s-blue   { fill: #85B7EB; }
        .s-purple { fill: #AFA9EC; }
        .s-teal   { fill: #5DCAA5; }
        .s-amber  { fill: #EF9F27; }
        .s-green  { fill: #97C459; }
      }
    </style>
  </defs>

  <!-- CARD 1: Role — blue -->
  <g class="c1" style="transform-origin: 82px 100px;">
    <rect x="8" y="20" width="148" height="160" rx="16" class="bg-blue" stroke-width="1.4"/>
    <text x="82" y="90" text-anchor="middle" class="icon-text">📊</text>
    <text x="82" y="122" text-anchor="middle" class="title-text t-blue">Data Analyst</text>
    <text x="82" y="140" text-anchor="middle" class="sub-text s-blue">&amp; ML Engineer</text>
  </g>

  <!-- CARD 2: Location — purple -->
  <g class="c2" style="transform-origin: 240px 100px;">
    <rect x="166" y="20" width="148" height="160" rx="16" class="bg-purple" stroke-width="1.4"/>
    <text x="240" y="90" text-anchor="middle" class="icon-text">📍</text>
    <text x="240" y="122" text-anchor="middle" class="title-text t-purple">Brampton, CA</text>
    <text x="240" y="140" text-anchor="middle" class="sub-text s-purple">Open to Remote</text>
  </g>

  <!-- CARD 3: Education — teal -->
  <g class="c3" style="transform-origin: 398px 100px;">
    <rect x="324" y="20" width="148" height="160" rx="16" class="bg-teal" stroke-width="1.4"/>
    <text x="398" y="90" text-anchor="middle" class="icon-text">🎓</text>
    <text x="398" y="122" text-anchor="middle" class="title-text t-teal">M.S. Analytics</text>
    <text x="398" y="140" text-anchor="middle" class="sub-text s-teal">UNF · 2026</text>
  </g>

  <!-- CARD 4: Focus — amber -->
  <g class="c4" style="transform-origin: 556px 100px;">
    <rect x="482" y="20" width="148" height="160" rx="16" class="bg-amber" stroke-width="1.4"/>
    <text x="556" y="87" text-anchor="middle" class="icon-text">🎯</text>
    <text x="556" y="120" text-anchor="middle" class="title-text t-amber">DA | DS Roles</text>
    <text x="556" y="138" text-anchor="middle" class="sub-text s-amber">Power BI · Python</text>
    <text x="556" y="154" text-anchor="middle" class="sub-text s-amber">SQL · ML</text>
  </g>

  <!-- CARD 5: Status — green -->
  <g class="c5" style="transform-origin: 714px 100px;">
    <rect x="640" y="20" width="148" height="160" rx="16" class="bg-green" stroke-width="1.4"/>
    <text x="714" y="90" text-anchor="middle" class="icon-text">✅</text>
    <text x="714" y="122" text-anchor="middle" class="title-text t-green">Available</text>
    <text x="714" y="140" text-anchor="middle" class="sub-text s-green">Hire me!</text>
  </g>

</svg>

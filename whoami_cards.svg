Whoami cards · SVG
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
 
      /* All cards same width: 5 cards, gap=10, total=800, so each=(800-60)/5=148 */
 
      .title-text { font-size: 13px; font-weight: 600; font-family: 'Inter', -apple-system, sans-serif; }
      .sub-text   { font-size: 11px; font-weight: 400; font-family: 'Inter', -apple-system, sans-serif; }
      .icon-text  { font-size: 28px; }
 
      /* ---- per-card continuous flip loop ---- */
      /* Each card: show front 2s, flip to back 0.5s, show back 2s, flip to front 0.5s  = 5s cycle */
      /* stagger: card N starts at N*0.8s delay */
 
      .front { transform-origin: center; animation: showFront 5s ease-in-out infinite; }
      .back  { transform-origin: center; animation: showBack  5s ease-in-out infinite; opacity: 0; }
 
      .c1 .front { animation-delay: 0s; }
      .c1 .back  { animation-delay: 0s; }
      .c2 .front { animation-delay: 0.8s; }
      .c2 .back  { animation-delay: 0.8s; }
      .c3 .front { animation-delay: 1.6s; }
      .c3 .back  { animation-delay: 1.6s; }
      .c4 .front { animation-delay: 2.4s; }
      .c4 .back  { animation-delay: 2.4s; }
      .c5 .front { animation-delay: 3.2s; }
      .c5 .back  { animation-delay: 3.2s; }
 
      @keyframes showFront {
        /* visible 0-40% */
        0%   { transform: rotateY(0deg);   opacity: 1; }
        40%  { transform: rotateY(0deg);   opacity: 1; }
        /* flip out 40-50% */
        50%  { transform: rotateY(90deg);  opacity: 0; }
        /* hidden while back is shown 50-90% */
        90%  { transform: rotateY(90deg);  opacity: 0; }
        /* flip back in 90-100% */
        100% { transform: rotateY(0deg);   opacity: 1; }
      }
 
      @keyframes showBack {
        /* hidden 0-40% */
        0%   { transform: rotateY(-90deg); opacity: 0; }
        40%  { transform: rotateY(-90deg); opacity: 0; }
        /* flip in 40-50% */
        50%  { transform: rotateY(0deg);   opacity: 1; }
        /* visible 50-90% */
        90%  { transform: rotateY(0deg);   opacity: 1; }
        /* flip out 90-100% */
        100% { transform: rotateY(-90deg); opacity: 0; }
      }
 
      /* Light mode */
      .bg-blue   { fill: #EBF3FD; stroke: #B5D4F4; }
      .bg-purple { fill: #EEEDFE; stroke: #CECBF6; }
      .bg-teal   { fill: #E1F5EE; stroke: #9FE1CB; }
      .bg-amber  { fill: #FAEEDA; stroke: #FAC775; }
      .bg-green  { fill: #EAF3DE; stroke: #C0DD97; }
 
      .t-blue   { fill: #185FA5; }
      .t-purple { fill: #534AB7; }
      .t-teal   { fill: #0F6E56; }
      .t-amber  { fill: #854F0B; }
      .t-green  { fill: #3B6D11; }
 
      .s-blue   { fill: #378ADD; }
      .s-purple { fill: #7F77DD; }
      .s-teal   { fill: #1D9E75; }
      .s-amber  { fill: #BA7517; }
      .s-green  { fill: #639922; }
 
      @media (prefers-color-scheme: dark) {
        .bg-blue   { fill: #0C447C; stroke: #378ADD; }
        .bg-purple { fill: #3C3489; stroke: #7F77DD; }
        .bg-teal   { fill: #085041; stroke: #1D9E75; }
        .bg-amber  { fill: #633806; stroke: #EF9F27; }
        .bg-green  { fill: #27500A; stroke: #97C459; }
 
        .t-blue   { fill: #B5D4F4; }
        .t-purple { fill: #CECBF6; }
        .t-teal   { fill: #9FE1CB; }
        .t-amber  { fill: #FAC775; }
        .t-green  { fill: #C0DD97; }
 
        .s-blue   { fill: #85B7EB; }
        .s-purple { fill: #AFA9EC; }
        .s-teal   { fill: #5DCAA5; }
        .s-amber  { fill: #EF9F27; }
        .s-green  { fill: #97C459; }
      }
    </style>
  </defs>
 
  <!-- 5 cards, each 148px wide, gap 10px, starting x=8 -->
  <!-- x positions: 8, 166, 324, 482, 640  -->
 
  <!-- CARD 1: Role — blue -->
  <g class="c1">
    <g class="front" style="transform-origin: 82px 100px;">
      <rect x="8" y="20" width="148" height="160" rx="14" class="bg-blue" stroke-width="1.2"/>
      <text x="82" y="94" text-anchor="middle" class="icon-text">📊</text>
      <text x="82" y="138" text-anchor="middle" class="title-text t-blue">Role</text>
    </g>
    <g class="back" style="transform-origin: 82px 100px;">
      <rect x="8" y="20" width="148" height="160" rx="14" class="bg-blue" stroke-width="1.2"/>
      <text x="82" y="90" text-anchor="middle" class="title-text t-blue">Data Analyst</text>
      <text x="82" y="110" text-anchor="middle" class="sub-text s-blue">&amp; ML Engineer</text>
    </g>
  </g>
 
  <!-- CARD 2: Location — purple -->
  <g class="c2">
    <g class="front" style="transform-origin: 240px 100px;">
      <rect x="166" y="20" width="148" height="160" rx="14" class="bg-purple" stroke-width="1.2"/>
      <text x="240" y="94" text-anchor="middle" class="icon-text">📍</text>
      <text x="240" y="138" text-anchor="middle" class="title-text t-purple">Location</text>
    </g>
    <g class="back" style="transform-origin: 240px 100px;">
      <rect x="166" y="20" width="148" height="160" rx="14" class="bg-purple" stroke-width="1.2"/>
      <text x="240" y="90" text-anchor="middle" class="title-text t-purple">Brampton, CA</text>
      <text x="240" y="110" text-anchor="middle" class="sub-text s-purple">Open to Remote</text>
    </g>
  </g>
 
  <!-- CARD 3: Education — teal -->
  <g class="c3">
    <g class="front" style="transform-origin: 398px 100px;">
      <rect x="324" y="20" width="148" height="160" rx="14" class="bg-teal" stroke-width="1.2"/>
      <text x="398" y="94" text-anchor="middle" class="icon-text">🎓</text>
      <text x="398" y="138" text-anchor="middle" class="title-text t-teal">Education</text>
    </g>
    <g class="back" style="transform-origin: 398px 100px;">
      <rect x="324" y="20" width="148" height="160" rx="14" class="bg-teal" stroke-width="1.2"/>
      <text x="398" y="90" text-anchor="middle" class="title-text t-teal">M.S. Analytics</text>
      <text x="398" y="110" text-anchor="middle" class="sub-text s-teal">UNF · 2026</text>
    </g>
  </g>
 
  <!-- CARD 4: Focus — amber -->
  <g class="c4">
    <g class="front" style="transform-origin: 556px 100px;">
      <rect x="482" y="20" width="148" height="160" rx="14" class="bg-amber" stroke-width="1.2"/>
      <text x="556" y="94" text-anchor="middle" class="icon-text">🎯</text>
      <text x="556" y="138" text-anchor="middle" class="title-text t-amber">Focus</text>
    </g>
    <g class="back" style="transform-origin: 556px 100px;">
      <rect x="482" y="20" width="148" height="160" rx="14" class="bg-amber" stroke-width="1.2"/>
      <text x="556" y="83" text-anchor="middle" class="title-text t-amber">DA | DS Roles</text>
      <text x="556" y="103" text-anchor="middle" class="sub-text s-amber">Power BI · Python</text>
      <text x="556" y="120" text-anchor="middle" class="sub-text s-amber">SQL · ML</text>
    </g>
  </g>
 
  <!-- CARD 5: Status — green -->
  <g class="c5">
    <g class="front" style="transform-origin: 714px 100px;">
      <rect x="640" y="20" width="148" height="160" rx="14" class="bg-green" stroke-width="1.2"/>
      <text x="714" y="94" text-anchor="middle" class="icon-text">✅</text>
      <text x="714" y="138" text-anchor="middle" class="title-text t-green">Status</text>
    </g>
    <g class="back" style="transform-origin: 714px 100px;">
      <rect x="640" y="20" width="148" height="160" rx="14" class="bg-green" stroke-width="1.2"/>
      <text x="714" y="90" text-anchor="middle" class="title-text t-green">Available</text>
      <text x="714" y="110" text-anchor="middle" class="sub-text s-green">Hire me!</text>
    </g>
  </g>
 
</svg>
